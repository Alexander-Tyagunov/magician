      <stop offset="0" stop-color="#0b0b14"/><stop offset="0.55" stop-color="#12122a"/><stop offset="1" stop-color="#0d0b1e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6C63FF"/><stop offset="0.5" stop-color="#a78bfa"/><stop offset="1" stop-color="#22d3ee"/>
