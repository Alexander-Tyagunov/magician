    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#6C63FF" stop-opacity="0.5"/><stop offset="1" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="640" cy="270" rx="620" ry="240" fill="url(#glow)"/>
  <rect x="20" y="20" width="1240" height="600" rx="28" fill="none" stroke="url(#stroke)" stroke-width="2" stroke-opacity="0.35"/>

  <!-- sparkles -->
