  <g fill="#22d3ee"><path d="M1070,180 l2.4,-7 l2.4,7 l7,2.4 l-7,2.4 l-2.4,7 l-2.4,-7 l-7,-2.4 z" opacity="0.85"/></g>
  <g fill="#ffffff"><path d="M1090,470 l1.8,-5 l1.8,5 l5,1.8 l-5,1.8 l-1.8,5 l-1.8,-5 l-5,-1.8 z" opacity="0.8"/></g>
  <g fill="#6C63FF"><path d="M195,450 l2.4,-7 l2.4,7 l7,2.4 l-7,2.4 l-2.4,7 l-2.4,-7 l-7,-2.4 z" opacity="0.8"/></g>

